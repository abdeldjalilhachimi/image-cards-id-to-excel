<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استخراج رقم التعريف الوطني — بطاقات الهوية الجزائرية</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .drop-zone {
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4299e1;
      background: #ebf8ff;
    }

    .drop-zone svg {
      width: 48px;
      height: 48px;
      color: #a0aec0;
      margin-bottom: 1rem;
    }

    .drop-zone p {
      color: #4a5568;
      font-size: 0.95rem;
    }

    .drop-zone span {
      color: #4299e1;
      font-weight: 600;
      cursor: pointer;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .file-list {
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #f7fafc;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      font-size: 0.88rem;
      color: #2d3748;
    }

    .file-item svg { flex-shrink: 0; color: #68d391; }

    .file-item .remove {
      margin-right: auto;
      cursor: pointer;
      color: #fc8181;
      font-size: 1.1rem;
      line-height: 1;
      background: none;
      border: none;
    }

    .btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.85rem;
      background: #4299e1;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn:hover:not(:disabled) { background: #3182ce; }

    .btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .status {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .status.info  { background: #ebf8ff; color: #2b6cb0; display: block; }
    .status.error { background: #fff5f5; color: #c53030; display: block; }
    .status.ok    { background: #f0fff4; color: #276749; display: block; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .copyright {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>استخراج رقم التعريف الوطني — بطاقات الهوية الجزائرية</h1>
    <p class="subtitle">قم برفع صورة أو أكثر لبطاقات الهوية — يتم استخراج رقم التعريف الوطني والاسم واللقب محلياً (عربي + فرنسي) وتصديرها كملف Excel.</p>

    <div class="drop-zone" id="dropZone">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p>اسحب وأفلت صور بطاقات الهوية هنا، أو <span id="browseBtn">تصفّح</span></p>
      <p style="margin-top:0.4rem;font-size:0.82rem;color:#a0aec0;">يدعم صيغ JPEG وPNG وWebP</p>
      <input type="file" id="fileInput" accept="image/*" multiple />
    </div>

    <div class="file-list" id="fileList"></div>

    <button class="btn" id="submitBtn" disabled>
      استخراج وتنزيل ملف XLSX
    </button>

    <div class="status" id="status"></div>

    <p class="copyright">© جميع الحقوق محفوظة — Abdeldjalil Hachimi</p>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const browseBtn  = document.getElementById('browseBtn');
    const fileList   = document.getElementById('fileList');
    const submitBtn  = document.getElementById('submitBtn');
    const statusEl   = document.getElementById('status');

    let files = [];

    browseBtn.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', (e) => {
      if (e.target !== browseBtn) fileInput.click();
    });

    fileInput.addEventListener('change', () => addFiles(Array.from(fileInput.files)));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
    });

    function addFiles(newFiles) {
      const existing = new Set(files.map(f => f.name + f.size));
      newFiles.forEach(f => { if (!existing.has(f.name + f.size)) files.push(f); });
      renderList();
      fileInput.value = '';
    }

    function renderList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
          </svg>
          <span>${f.name}</span>
          <button class="remove" data-idx="${i}" title="حذف">×</button>`;
        fileList.appendChild(item);
      });
      fileList.querySelectorAll('.remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          files.splice(+btn.dataset.idx, 1);
          renderList();
        });
      });
      submitBtn.disabled = files.length === 0;
      setStatus('', '');
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    submitBtn.addEventListener('click', async () => {
      if (!files.length) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div> جارٍ المعالجة…';
      setStatus(`جارٍ تشغيل التعرف الضوئي على ${files.length} صورة — قد يستغرق ذلك بضع ثوانٍ لكل بطاقة…`, 'info');

      const form = new FormData();
      files.forEach(f => form.append('files', f));

      try {
        const resp = await fetch('/extract', { method: 'POST', body: form });

        if (!resp.ok) {
          const txt = await resp.text();
          throw new Error(txt || `خطأ في الخادم ${resp.status}`);
        }

        const data = await resp.json();
        window.location.href = '/download/' + data.token;

        setStatus(`تمّ! تمت معالجة ${files.length} بطاقة. بدأ التنزيل.`, 'ok');
      } catch (err) {
        setStatus('خطأ: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = files.length === 0;
        submitBtn.innerHTML = 'استخراج وتنزيل ملف XLSX';
      }
    });
  </script>
</body>
</html>
